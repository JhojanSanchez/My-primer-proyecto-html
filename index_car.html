<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css"><!-- carrito.css -->
</head>

<body>

    <div class="wrapper">
        <aside>
            <header>

                <h1 class="logo">Carrito</h1>
                <br>
                <img src="img/logoSS2.png" alt="SkateShop" height="110" width="200">

            </header>
            <nav>
                <ul class="menu">
                    <li>
                        <a class="boton-menu boton-carrito" href="./carrito.html"
                            style="margin-top: 0; background-color: var(--primary-color); border-radius: 1rem; margin-bottom: 1rem;">
                            <i class="bi bi-cart-fill"></i> Carrito <span id="numerito" class="numerito">0</span>
                        </a>
                    </li>
                    <li>
                        <button id="todos" class="boton-menu boton-categoria active"><i
                                class="bi bi-hand-index-thumb-fill"></i> Todos los productos</button>
                    </li>
                    <li>
                        <button id="agresivo" class="boton-menu boton-categoria"><i class="bi bi-hand-index-thumb"></i>
                            Agresivos</button>
                    </li>
                    <li>
                        <button id="slalom" class="boton-menu boton-categoria"><i class="bi bi-hand-index-thumb"></i>
                            Slalom</button>
                    </li>
                    <li>
                        <button id="freeskate" class="boton-menu boton-categoria"><i class="bi bi-hand-index-thumb"></i>
                            Freeskate</button>
                    </li>
                    <li>
                        <button id="carrera" class="boton-menu boton-categoria"><i class="bi bi-hand-index-thumb"></i>
                            Carrera</button>
                    </li>
                    <li>
                        <button id="accesorios" class="boton-menu boton-categoria"><i
                                class="bi bi-hand-index-thumb"></i> Accesorios</button>
                    </li>
                    <li>
                        <a class="boton-menu" href="./index.html"
                            style="margin-top: 1rem; border-top: 1px solid var(--clr-gray);">
                            <i class="bi bi-arrow-return-left"></i> Volver a la tienda
                        </a>
                    </li>
                </ul>
            </nav>
            <footer>
                <p class=""> Jhojan Sanchez © 2025 </p>
            </footer>
        </aside>
        <main>
            <h2 class="titulo-principal" id="titulo-principal">Todos los productos</h2>
            <div id="contenedor-productos" class="contenedor-productos">
                <!-- Esto se va a rellenar con código JS -->
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase-config.js"></script>
    <script src="./js/cart-system.js"></script>
    <script src="./js/products.js"></script>
</body>

</html>
